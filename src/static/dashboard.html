<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INASC — Dashboard de Asesor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --inasc-green: #00b33f;
            --inasc-blue: #244253;
            --inasc-blue-light: #2e5468;
            --bg: #f5f5f5;
            --sidebar: #ffffff;
            --header: #244253;
            --accent: #00b33f;
            --text: #244253;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #00b33f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Titillium Web', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* Sidebar: Chat List */
        #sidebar {
            width: 320px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .sidebar-header {
            padding: 20px;
            background: #fff;
            border-bottom: 2px solid var(--inasc-green);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .logo-placeholder {
            height: 40px;
            width: 100%;
            background: #f1f5f9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            border: 1px dashed var(--border);
        }
        .sidebar-header h2 { font-size: 1.1rem; color: var(--inasc-blue); }
        #chat-list { flex: 1; overflow-y: auto; background: #fafafa; }
        .chat-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .chat-item:hover { background: #f1f5f9; }
        .chat-item.active { background: #e8f8ee; border-left: 4px solid var(--inasc-green); }
        .chat-name { font-weight: 600; display: block; margin-bottom: 4px; color: var(--inasc-blue); }
        .chat-meta { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }

        /* Main: Chat View */
        #main { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        #chat-header {
            padding: 15px 25px;
            background: linear-gradient(135deg, var(--inasc-blue) 0%, var(--inasc-blue-light) 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fdfdfd;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .message.user { 
            align-self: flex-start; 
            background: #fff; 
            border: 1px solid var(--border); 
            border-bottom-left-radius: 4px;
        }
        .message.assistant { 
            align-self: flex-end; 
            background: var(--inasc-green); 
            color: white; 
            border-bottom-right-radius: 4px;
        }
        .message.bot { 
            align-self: flex-start; 
            background: #f1f5f9; 
            border: 1px dashed var(--text-muted); 
            font-style: italic; 
            font-size: 0.85rem;
            opacity: 0.8;
        }

        #chat-input-area {
            padding: 15px 25px;
            background: #fff;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #message-input {
            flex: 1;
            background: #f8fafc;
            border: 2px solid var(--border);
            padding: 12px 18px;
            border-radius: 25px;
            color: var(--text);
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        #message-input:focus { border-color: var(--inasc-green); background: #fff; box-shadow: 0 0 0 4px rgba(0, 179, 63, 0.1); }
        
        .btn-send {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--inasc-green);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0, 179, 63, 0.2);
            font-size: 1.1rem;
        }
        .btn-send:hover { background: var(--inasc-green-dark); transform: scale(1.05); }
        .btn-send:active { transform: scale(0.95); }
        .btn-send:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        .btn-success { 
            background: var(--success); 
            color: white; 
            padding: 8px 16px; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-success:hover { opacity: 0.9; }

        /* Statuses */
        .empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="logo-placeholder" id="logo-container">
                <!-- Reemplazar con <img src="assets/logo-inasc.svg" alt="INASC Logo"> -->
                [ LOGO INASC ]
            </div>
            <h2>Chats Pendientes</h2>
            <span id="tenant-badge" style="font-size: 0.7rem; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);">Tenant: ?</span>
        </div>
        <div id="chat-list">
            <!-- Dynamic chats -->
        </div>
    </div>

    <div id="main">
        <div id="chat-header">
            <div>
                <h3 id="current-user-name">Selecciona un chat</h3>
                <span id="current-platform" style="font-size: 0.8rem; color: var(--text-muted);"></span>
            </div>
            <div id="header-actions" style="visibility: hidden;">
                <button class="btn-success" onclick="closeConversation()">
                    <i class="fas fa-check-circle"></i> Finalizar y Devolver al Bot
                </button>
            </div>
        </div>

        <div id="chat-messages">
            <div class="empty-state">No hay ningún chat seleccionado.</div>
        </div>

        <div id="chat-input-area" style="visibility: hidden;">
            <input type="text" id="message-input" placeholder="Escribe tu respuesta..." autofocus>
            <button class="btn-send" id="btn-send" onclick="sendMessage()" title="Enviar mensaje">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
